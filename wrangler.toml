# Cloudflare Workers + Static Assets（前端 SPA）+ Pages Functions（API）
# 部署模式：GitHub Git 集成自动部署
# 详见 docs/cloudflare-setup.md
#
# M0 阶段：D1/R2 binding 暂未激活（线上资源未创建）。
# 前端 SPA + scrape-proxy 正常工作；health 端点在 binding 激活前会返回 503。
# 创建 D1/R2 后取消下方注释并填入真实 database_id。

name = "traversal"
compatibility_date = "2025-07-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[vars]
ENV = "production"
APP_VERSION = "0.1.0"

# D1 数据库绑定（待创建后取消注释，填入真实 database_id）
# 创建：npx wrangler d1 create family-atlas
# [[d1_databases]]
# binding = "DB"
# database_name = "family-atlas"
# database_id = "填入真实id"
# migrations_dir = "db/migrations"

# R2 对象存储（待创建后取消注释）
# 创建：npx wrangler r2 bucket create family-atlas-media
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "family-atlas-media"

# NOTE: 队列（Queues）M3 数据同步阶段才需要。
