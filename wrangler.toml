# Cloudflare Workers（Worker 入口 + Static Assets binding）
# 部署模式：GitHub Git 集成自动部署到 *.workers.dev
# - Worker（src/worker.ts）处理 /api/* 路由
# - Assets binding 托管前端 SPA + fallback
# 详见 docs/cloudflare-setup.md

name = "traversal"
compatibility_date = "2025-07-01"
main = "worker/index.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[vars]
ENV = "production"
APP_VERSION = "0.1.0"

# D1 数据库绑定（待创建后取消注释，填入真实 database_id）
# 创建：npx wrangler d1 create family-atlas
# [[d1_databases]]
# binding = "DB"
# database_name = "family-atlas"
# database_id = "填入真实id"
# migrations_dir = "db/migrations"

# R2 对象存储（待创建后取消注释）
# 创建：npx wrangler r2 bucket create family-atlas-media
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "family-atlas-media"

# NOTE: 队列（Queues）M3 数据同步阶段才需要。
